<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Received — RichMadeIt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Bangers&family=Barlow+Condensed:wght@400;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap" rel="stylesheet">

  <!-- ════════════════════════════════════════════
       META PIXEL — base load only (Purchase fires conditionally below)
  ════════════════════════════════════════════ -->
  <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '993108543300382');
    fbq('track', 'PageView');
  </script>
  <noscript>
    <img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=993108543300382&ev=PageView&noscript=1"/>
  </noscript>

  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg:#070707; --bg2:#0d0d0d; --bg3:#161616;
      --accent:#FF5500; --gold:#FFB300; --logo-red:#D93500;
      --text:#EFEFEF; --muted:#777; --border:rgba(255,85,0,.18);
      --fs:'Barlow Condensed',sans-serif; --fb:'DM Sans',sans-serif;
    }
    body { background:var(--bg); color:var(--text); font-family:var(--fb); min-height:100vh; display:flex; flex-direction:column; }

    header { display:flex; align-items:center; justify-content:center; padding:20px; border-bottom:1px solid var(--border); }
    .logo { font-family:'Bangers',cursive; font-style:italic; font-size:2rem; letter-spacing:2px; color:var(--logo-red); display:inline-flex; align-items:flex-end; gap:2px; line-height:1; }
    .logo-flame { display:inline-block; margin-bottom:-3px; }

    .main { flex:1; display:flex; align-items:center; justify-content:center; padding:40px 20px; }
    .box { text-align:center; max-width:540px; width:100%; }

    .icon { font-size:4.5rem; margin-bottom:20px; animation:pop .5s cubic-bezier(.36,2,.6,1); }
    @keyframes pop { from{transform:scale(0)} to{transform:scale(1)} }

    h1 { font-family:'Bangers',cursive; font-style:italic; font-size:clamp(3rem,10vw,5rem); letter-spacing:3px; line-height:1; margin-bottom:12px; }
    h1 span { color:var(--accent); }

    .sub { font-family:var(--fs); font-size:1.1rem; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:24px; }

    .order-tag { display:inline-block; font-family:var(--fs); font-size:.85rem; font-weight:700; letter-spacing:2px; color:var(--gold); background:rgba(255,179,0,.1); border:1px solid rgba(255,179,0,.3); padding:8px 16px; margin-bottom:28px; }

    .steps { text-align:left; background:var(--bg3); border:1px solid var(--border); padding:24px; margin-bottom:24px; }
    .steps-title { font-family:var(--fs); font-size:.75rem; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:var(--accent); margin-bottom:16px; padding-bottom:12px; border-bottom:1px solid var(--border); }
    .step-item { display:flex; gap:14px; align-items:flex-start; padding:10px 0; border-bottom:1px solid rgba(255,255,255,.05); }
    .step-item:last-child { border-bottom:none; }
    .step-num { font-family:'Bangers',cursive; font-size:1.6rem; color:var(--accent); line-height:1; flex-shrink:0; width:28px; }
    .step-text { font-size:.92rem; color:var(--text); line-height:1.5; padding-top:2px; }
    .step-text strong { color:var(--gold); }

    .ig-block { background:var(--bg3); border:1px solid var(--border); padding:20px 24px; margin-bottom:24px; }
    .ig-label { font-family:var(--fs); font-size:.7rem; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:var(--accent); margin-bottom:10px; }
    .ig-handle { display:flex; align-items:center; justify-content:center; gap:10px; }
    .ig-handle a { font-family:var(--fs); font-size:1.6rem; font-weight:700; color:var(--text); text-decoration:none; letter-spacing:1px; transition:color .2s; }
    .ig-handle a:hover { color:var(--accent); }
    .ig-note { font-size:.78rem; color:var(--muted); margin-top:8px; }

    .btn-home { display:inline-block; background:var(--bg3); border:1px solid var(--border); color:var(--muted); font-family:var(--fs); font-size:.78rem; font-weight:700; letter-spacing:2px; text-transform:uppercase; padding:12px 28px; text-decoration:none; transition:all .2s; }
    .btn-home:hover { border-color:var(--accent); color:var(--accent); }
    .btn-upload { display:block; width:100%; background:linear-gradient(135deg,var(--accent),var(--gold)); color:#fff; font-family:'Bangers',cursive; font-style:italic; font-size:1.5rem; letter-spacing:2px; padding:20px 24px; text-decoration:none; text-align:center; transition:all .25s; box-shadow:0 8px 28px rgba(255,85,0,.3); margin-bottom:10px; }
    .btn-upload:hover { transform:translateY(-2px); box-shadow:0 12px 36px rgba(255,85,0,.5); }
    .btn-upload .bu-sub { display:block; font-family:var(--fs); font-style:normal; font-size:.72rem; font-weight:700; letter-spacing:2px; text-transform:uppercase; opacity:.9; margin-top:4px; }
    .upload-note { font-size:.82rem; color:var(--muted); line-height:1.5; margin-bottom:24px; }
    .upload-note strong { color:var(--gold); }

    /* unpaid fallback state */
    .unpaid-state .icon { font-size:3.5rem; }
    .unpaid-state h1 span { color:var(--gold); }

    @media(max-width:480px) { .main { padding:28px 16px; } }
  </style>
</head>
<body>

<header>
  <div class="logo">RichmadeiT
    <svg class="logo-flame" width="18" height="14" viewBox="0 0 28 20">
      <path d="M2 4 C6 1,18 2,24 10 C26 14,22 19,14 18" stroke="#FFD700" stroke-width="3.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
</header>

<div class="main">
  <div class="box" id="contentBox">
    <!-- content rendered by JS based on payment status -->
  </div>
</div>

<script>
  // Detect payment status from URL (Stripe return URL should include ?paid=true)
  const urlParams = new URLSearchParams(window.location.search);
  const paidParam = urlParams.get('paid') === 'true' ||
                    urlParams.get('paymentId') ||
                    urlParams.get('token') ||
                    urlParams.get('PayerID');

  // Pull the stashed order from localStorage (set on form submit before Stripe redirect)
  let pendingOrder = null;
  try {
    const raw = localStorage.getItem('rmi_pending_order');
    if (raw) pendingOrder = JSON.parse(raw);
  } catch (e) { /* ignore */ }

  const contentBox = document.getElementById('contentBox');

  if (paidParam && pendingOrder) {
    // ═══════════════════════════════════════
    // PAID FLOW — fire Meta Purchase + update Supabase
    // ═══════════════════════════════════════
    const amount = pendingOrder.amount || 397;
    const orderNum = pendingOrder.order_number || 'RMI-PENDING';
    const pkgName = pendingOrder.package || '720p Music Video';
    const pkgEta = pendingOrder.eta || '1-5 days';
    const etaText = pkgEta.indexOf('1-2') !== -1 ? '1-2 weeks' : '1-5 days';
    const videoLabel = pkgName;

    // Fire Meta Pixel Purchase event (only once per order)
    const firedKey = `rmi_purchase_fired_${orderNum}`;
    if (!localStorage.getItem(firedKey)) {
      if (typeof fbq !== 'undefined') {
        fbq('track', 'Purchase', {
          value: amount,
          currency: 'USD',
          content_name: 'RichMadeIt ' + pkgName,
          content_category: 'AI Music Video',
          content_ids: [orderNum],
          num_items: 1
        });
      }
      localStorage.setItem(firedKey, '1');
    }

    // Update Supabase status to paid
    (async () => {
      try {
        if (typeof CONFIG !== 'undefined' && CONFIG.SUPABASE_URL && CONFIG.SUPABASE_URL.indexOf('YOUR_PROJECT') === -1) {
          const { createClient } = supabase;
          const db = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
          await db.from('video_inquiries')
            .update({
              status: 'deposit_paid',
              deposit_paid: true,
              deposit_paid_at: new Date().toISOString(),
              price_charged: amount,
              package: pkgName
            })
            .eq('order_number', orderNum);
        }
      } catch (e) { console.error('Supabase update failed:', e); }
    })();

    // Clear the pending order so refresh doesn't re-fire
    localStorage.removeItem('rmi_pending_order');

    contentBox.innerHTML = `
      <div class="icon">🔥</div>
      <h1>You're <span>Locked In!</span></h1>
      <p class="sub">$${amount} received · ${videoLabel} starting production</p>

      <div class="order-tag">ORDER ${orderNum}</div>

      ${pendingOrder.email ? `<div style="font-size:.85rem;color:var(--muted);margin-top:-16px;margin-bottom:24px">Video will be sent to <strong style="color:var(--gold)">${pendingOrder.email}</strong></div>` : ''}

      <a href="intake.html?order=${encodeURIComponent(orderNum)}&pkg=${encodeURIComponent(pkgName)}&email=${encodeURIComponent(pendingOrder.email || '')}&name=${encodeURIComponent(pendingOrder.name || '')}" class="btn-upload">
        📤 Upload Your Song & Details
        <span class="bu-sub">Required to start your video →</span>
      </a>
      <p class="upload-note">This is the most important step — I can't start until you send your song + photos. <strong>No song out yet? No problem</strong> — there's an option for that on the next page (just give me your release date).</p>

      <div class="steps">
        <div class="steps-title">What Happens Next</div>
        <div class="step-item">
          <div class="step-num">1</div>
          <div class="step-text"><strong>Tap the button above</strong> to upload your song, photos, and the vibe you want. Takes 2 minutes.</div>
        </div>
        <div class="step-item">
          <div class="step-num">2</div>
          <div class="step-text">Your <strong>${videoLabel}</strong> will be delivered within <strong>${etaText}</strong> straight to your <strong>email inbox</strong>.</div>
        </div>
        <div class="step-item">
          <div class="step-num">3</div>
          <div class="step-text">Want a full-length music video next? <strong>DM @rich_madeit_</strong> — limited spots, custom-quoted per artist.</div>
        </div>
      </div>

      <div class="ig-block">
        <div class="ig-label">⚠ Check Your Spam / Promotions Folder</div>
        <div class="ig-handle">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <a href="mailto:rich.madeit1@gmail.com">rich.madeit1@gmail.com</a>
        </div>
        <div class="ig-note">Add this email to your contacts so the video doesn't get filtered. Also follow <a href="https://instagram.com/rich_madeit_" target="_blank" style="color:var(--accent);text-decoration:none">@rich_madeit_</a> for updates 📲</div>
      </div>

      <a href="index.html" class="btn-home">← Back to Home</a>
    `;

  } else {
    // ═══════════════════════════════════════
    // UNPAID / DIRECT VISIT FALLBACK
    // ═══════════════════════════════════════
    contentBox.classList.add('unpaid-state');
    contentBox.innerHTML = `
      <div class="icon">💳</div>
      <h1>Almost <span>There</span></h1>
      <p class="sub">Complete your payment to lock in your spot</p>

      <div class="steps">
        <div class="steps-title">Heads Up</div>
        <div class="step-item">
          <div class="step-num">!</div>
          <div class="step-text">It looks like you landed here without completing payment. <strong>No payment, no video</strong> — that's the only way the process works.</div>
        </div>
        <div class="step-item">
          <div class="step-num">→</div>
          <div class="step-text">Head back to the form and finish locking in your spot. Or DM <strong>@rich_madeit_</strong> if something went wrong with checkout.</div>
        </div>
      </div>

      <div class="ig-block">
        <div class="ig-label">Questions? DM Me Directly</div>
        <div class="ig-handle">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
          <a href="https://instagram.com/rich_madeit_" target="_blank">@rich_madeit_</a>
        </div>
      </div>

      <a href="index.html" class="btn-home">← Back to Form</a>
    `;
  }
</script>

</body>
</html>
