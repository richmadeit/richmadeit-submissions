<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MicDrop Dashboard — RichMadeIt × 730</title>
<meta name="robots" content="noindex, nofollow" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Permanent+Marker&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<!-- Supabase JS Client -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
  --bg-black: #0a0a0a;
  --bg-darker: #050505;
  --bg-card: #111111;
  --bg-card-hover: #181818;
  --richmade-red: #ff4500;
  --richmade-red-glow: #ff6b35;
  --richmade-yellow: #ffd700;
  --radio-white: #f5f5f5;
  --on-air-red: #ff1a1a;
  --green: #00d971;
  --blue: #3b82f6;
  --purple: #a855f7;
  --text-primary: #ffffff;
  --text-secondary: rgba(255, 255, 255, 0.7);
  --text-muted: rgba(255, 255, 255, 0.45);
  --border-subtle: rgba(255, 255, 255, 0.1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg-black); color: var(--text-primary); font-family: 'Manrope', sans-serif; min-height: 100vh; }
button { font-family: inherit; cursor: pointer; }

/* ============ LOGIN ============ */
.login-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background:
    radial-gradient(ellipse at top left, rgba(255, 69, 0, 0.15), transparent 60%),
    radial-gradient(ellipse at bottom right, rgba(245, 245, 245, 0.05), transparent 60%),
    var(--bg-black);
}
.login-card {
  width: 100%;
  max-width: 420px;
  background: var(--bg-card);
  border: 2px solid var(--border-subtle);
  border-radius: 16px;
  padding: 40px 30px;
  text-align: center;
}
.login-logo {
  font-family: 'Permanent Marker', cursive;
  font-size: 28px;
  margin-bottom: 8px;
  color: var(--richmade-red);
}
.login-logo span { color: var(--radio-white); }
.login-title {
  font-family: 'Anton', sans-serif;
  font-size: 32px;
  text-transform: uppercase;
  margin-bottom: 30px;
  letter-spacing: 0.5px;
}
.login-input {
  width: 100%;
  background: var(--bg-darker);
  border: 2px solid var(--border-subtle);
  border-radius: 10px;
  padding: 14px 16px;
  color: var(--text-primary);
  font-size: 16px;
  margin-bottom: 16px;
  font-family: inherit;
}
.login-input:focus { outline: none; border-color: var(--richmade-red); }
.login-btn {
  width: 100%;
  background: var(--richmade-red);
  color: var(--bg-black);
  border: none;
  padding: 14px;
  border-radius: 10px;
  font-family: 'Anton', sans-serif;
  font-size: 18px;
  text-transform: uppercase;
  letter-spacing: 1px;
  box-shadow: 0 0 20px rgba(255, 69, 0, 0.4);
}
.login-btn:hover { background: var(--richmade-red-glow); }
.login-error {
  color: var(--on-air-red);
  margin-top: 10px;
  font-size: 13px;
  min-height: 18px;
}

/* ============ DASHBOARD HEADER ============ */
.dash-header {
  background: var(--bg-darker);
  border-bottom: 2px solid var(--border-subtle);
  padding: 16px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 50;
  backdrop-filter: blur(12px);
}
.dash-header h1 {
  font-family: 'Anton', sans-serif;
  font-size: 24px;
  text-transform: uppercase;
}
.dash-header h1 .red { color: var(--richmade-red); }
.dash-header h1 .white { color: var(--radio-white); }
.dash-logout {
  background: transparent;
  border: 1px solid var(--border-subtle);
  color: var(--text-secondary);
  padding: 8px 14px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.dash-logout:hover { background: var(--bg-card); color: var(--text-primary); }

/* ============ FILTERS ============ */
.filters {
  display: flex;
  gap: 8px;
  padding: 20px;
  overflow-x: auto;
  border-bottom: 1px solid var(--border-subtle);
  background: var(--bg-darker);
}
.filter-btn {
  background: var(--bg-card);
  border: 2px solid var(--border-subtle);
  color: var(--text-secondary);
  padding: 8px 14px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  white-space: nowrap;
  flex-shrink: 0;
}
.filter-btn:hover { background: var(--bg-card-hover); color: var(--text-primary); }
.filter-btn.active { background: var(--richmade-red); border-color: var(--richmade-red); color: var(--bg-black); }
.filter-btn .count {
  display: inline-block;
  background: rgba(0, 0, 0, 0.3);
  padding: 1px 7px;
  border-radius: 999px;
  margin-left: 6px;
  font-size: 11px;
}

/* ============ BOOKING LIST ============ */
.bookings-container { padding: 20px; max-width: 1100px; margin: 0 auto; }
.empty-state {
  text-align: center;
  padding: 80px 20px;
  color: var(--text-muted);
}
.empty-state-icon { font-size: 50px; margin-bottom: 16px; }
.empty-state-text { font-size: 15px; }

.booking-card {
  background: var(--bg-card);
  border: 2px solid var(--border-subtle);
  border-radius: 12px;
  padding: 18px;
  margin-bottom: 12px;
  cursor: pointer;
  transition: all 0.2s;
}
.booking-card:hover { border-color: rgba(255, 69, 0, 0.4); background: var(--bg-card-hover); }
.booking-card.status-new { border-left: 4px solid var(--richmade-red); }
.booking-card.status-accepted { border-left: 4px solid var(--blue); }
.booking-card.status-paid { border-left: 4px solid var(--richmade-yellow); }
.booking-card.status-in_production { border-left: 4px solid var(--purple); }
.booking-card.status-delivered { border-left: 4px solid var(--green); }
.booking-card.status-declined { border-left: 4px solid var(--text-muted); opacity: 0.6; }

.booking-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 8px;
}
.booking-artist {
  font-family: 'Anton', sans-serif;
  font-size: 22px;
  text-transform: uppercase;
  line-height: 1;
}
.booking-time {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  flex-shrink: 0;
  white-space: nowrap;
}
.booking-meta {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 10px;
}
.booking-meta .meta-item { display: flex; gap: 4px; align-items: center; }
.booking-bottom {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  border-top: 1px solid var(--border-subtle);
  padding-top: 10px;
}
.status-badge {
  font-family: 'Anton', sans-serif;
  font-size: 12px;
  letter-spacing: 1.5px;
  padding: 4px 10px;
  border-radius: 4px;
  text-transform: uppercase;
}
.status-badge.new { background: var(--richmade-red); color: var(--bg-black); }
.status-badge.accepted { background: var(--blue); color: white; }
.status-badge.paid { background: var(--richmade-yellow); color: var(--bg-black); }
.status-badge.in_production { background: var(--purple); color: white; }
.status-badge.delivered { background: var(--green); color: var(--bg-black); }
.status-badge.declined { background: var(--text-muted); color: var(--bg-black); }
.booking-price {
  font-family: 'Anton', sans-serif;
  font-size: 24px;
  color: var(--richmade-yellow);
}

/* ============ DETAIL MODAL ============ */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.85);
  z-index: 100;
  overflow-y: auto;
  padding: 20px;
}
.modal-overlay.show { display: block; }
.modal {
  background: var(--bg-card);
  border-radius: 16px;
  max-width: 700px;
  margin: 0 auto;
  border: 2px solid var(--border-subtle);
  overflow: hidden;
  position: relative;
}
.modal-close {
  position: absolute;
  top: 14px;
  right: 14px;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: rgba(0, 0, 0, 0.5);
  border: 1px solid var(--border-subtle);
  color: white;
  font-size: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 5;
}
.modal-header {
  padding: 24px;
  border-bottom: 1px solid var(--border-subtle);
  background: var(--bg-darker);
}
.modal-header h2 {
  font-family: 'Anton', sans-serif;
  font-size: 32px;
  text-transform: uppercase;
  line-height: 1;
}
.modal-header .modal-subtitle {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 6px;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.modal-body { padding: 24px; }

.detail-section { margin-bottom: 24px; }
.detail-label {
  font-family: 'Permanent Marker', cursive;
  color: var(--richmade-yellow);
  font-size: 14px;
  letter-spacing: 1px;
  margin-bottom: 8px;
  text-transform: uppercase;
}
.detail-row {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid var(--border-subtle);
  font-size: 14px;
  gap: 12px;
}
.detail-row:last-child { border-bottom: none; }
.detail-row .label { color: var(--text-secondary); font-weight: 600; }
.detail-row .value { color: var(--text-primary); text-align: right; word-break: break-word; }
.detail-row .value a { color: var(--richmade-red); text-decoration: none; }
.detail-row .value a:hover { text-decoration: underline; }

.photo-gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 10px;
  margin-top: 10px;
}
.photo-gallery img {
  width: 100%;
  aspect-ratio: 1;
  object-fit: cover;
  border-radius: 8px;
  border: 1px solid var(--border-subtle);
  cursor: pointer;
}

.addon-chip {
  display: inline-block;
  background: rgba(255, 69, 0, 0.15);
  border: 1px solid rgba(255, 69, 0, 0.4);
  color: var(--richmade-red-glow);
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 600;
  margin: 3px 3px 3px 0;
}

.vibe-notes-box {
  background: var(--bg-darker);
  padding: 14px;
  border-radius: 8px;
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.5;
  white-space: pre-wrap;
}

textarea.internal-notes {
  width: 100%;
  background: var(--bg-darker);
  border: 2px solid var(--border-subtle);
  border-radius: 8px;
  padding: 12px;
  color: var(--text-primary);
  font-family: inherit;
  font-size: 14px;
  resize: vertical;
  min-height: 70px;
}
textarea.internal-notes:focus { outline: none; border-color: var(--richmade-red); }

/* ============ ACTION BUTTONS ============ */
.actions {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 20px;
  padding-top: 20px;
  border-top: 2px solid var(--border-subtle);
}
.action-row { display: flex; gap: 8px; flex-wrap: wrap; }
.action-btn {
  flex: 1;
  min-width: 130px;
  padding: 12px;
  border: none;
  border-radius: 8px;
  font-family: 'Anton', sans-serif;
  font-size: 15px;
  text-transform: uppercase;
  letter-spacing: 1px;
  transition: all 0.2s;
}
.action-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-accept { background: var(--blue); color: white; }
.btn-accept:hover:not(:disabled) { background: #2563eb; }
.btn-decline { background: var(--bg-darker); color: var(--text-secondary); border: 2px solid var(--border-subtle); }
.btn-decline:hover:not(:disabled) { background: var(--text-muted); color: var(--bg-black); }
.btn-paid { background: var(--richmade-yellow); color: var(--bg-black); }
.btn-paid:hover:not(:disabled) { background: #e6c200; }
.btn-production { background: var(--purple); color: white; }
.btn-production:hover:not(:disabled) { background: #9333ea; }
.btn-delivered { background: var(--green); color: var(--bg-black); }
.btn-delivered:hover:not(:disabled) { background: #00b85e; }

.payment-message-box {
  background: linear-gradient(135deg, rgba(255, 69, 0, 0.1), transparent);
  border: 2px solid var(--richmade-red);
  border-radius: 10px;
  padding: 16px;
  margin-top: 14px;
}
.payment-message-box .pm-label {
  font-family: 'Permanent Marker', cursive;
  color: var(--richmade-red);
  font-size: 14px;
  margin-bottom: 8px;
  letter-spacing: 1px;
}
.payment-message-box textarea {
  width: 100%;
  background: var(--bg-darker);
  border: 1px solid var(--border-subtle);
  border-radius: 6px;
  padding: 10px;
  color: var(--text-primary);
  font-family: inherit;
  font-size: 13px;
  min-height: 140px;
  resize: vertical;
  line-height: 1.4;
}
.copy-btn {
  margin-top: 8px;
  background: var(--richmade-red);
  color: var(--bg-black);
  border: none;
  padding: 8px 14px;
  border-radius: 6px;
  font-family: 'Anton', sans-serif;
  font-size: 14px;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.copy-btn:hover { background: var(--richmade-red-glow); }

/* ============ STATS ============ */
.stats-bar {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 10px;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border-subtle);
}
.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: 8px;
  padding: 12px;
  text-align: center;
}
.stat-value {
  font-family: 'Anton', sans-serif;
  font-size: 26px;
  color: var(--richmade-yellow);
  line-height: 1;
}
.stat-label {
  font-size: 10px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-top: 4px;
}

/* ============ TOAST ============ */
.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--green);
  color: var(--bg-black);
  padding: 12px 20px;
  border-radius: 8px;
  font-weight: 700;
  font-size: 14px;
  z-index: 200;
  transition: transform 0.3s ease;
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
}
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>

<body>

<!-- ============ LOGIN ============ -->
<div class="login-screen" id="login-screen">
  <div class="login-card">
    <div class="login-logo">Rich<span>MadeIt</span></div>
    <h1 class="login-title">MicDrop Dash</h1>
    <input type="password" class="login-input" id="password-input" placeholder="Password" autocomplete="off" />
    <button class="login-btn" id="login-btn">Enter</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ============ DASHBOARD ============ -->
<div id="dashboard" style="display: none;">
  <header class="dash-header">
    <h1><span class="red">MicDrop</span> <span class="white">Dash</span></h1>
    <button class="dash-logout" id="logout-btn">Log Out</button>
  </header>

  <!-- Stats -->
  <div class="stats-bar" id="stats-bar"></div>

  <!-- Filters -->
  <div class="filters" id="filters">
    <button class="filter-btn active" data-filter="all">All <span class="count" id="count-all">0</span></button>
    <button class="filter-btn" data-filter="new">🆕 New <span class="count" id="count-new">0</span></button>
    <button class="filter-btn" data-filter="accepted">✅ Accepted <span class="count" id="count-accepted">0</span></button>
    <button class="filter-btn" data-filter="paid">💰 Paid <span class="count" id="count-paid">0</span></button>
    <button class="filter-btn" data-filter="in_production">🎬 Production <span class="count" id="count-in_production">0</span></button>
    <button class="filter-btn" data-filter="delivered">📦 Delivered <span class="count" id="count-delivered">0</span></button>
    <button class="filter-btn" data-filter="declined">❌ Declined <span class="count" id="count-declined">0</span></button>
  </div>

  <!-- Booking list -->
  <div class="bookings-container">
    <div id="bookings-list"></div>
  </div>
</div>

<!-- ============ DETAIL MODAL ============ -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="modal-close" id="modal-close">×</button>
    <div class="modal-header">
      <h2 id="m-artist"></h2>
      <div class="modal-subtitle" id="m-submitted"></div>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ============ CONFIG ============
// ⚠️ REPLACE THESE VALUES BEFORE DEPLOYING
const SUPABASE_URL = 'https://molqlfdjlmnlkscecngz.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1vbHFsZmRqbG1ubGtzY2Vjbmd6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1ODEzNjMsImV4cCI6MjA5MzE1NzM2M30._CR9A4H7-E7CYzIWdEO4PgRcCgBcORP2wAZqXrXE4Ec';
const DASHBOARD_PASSWORD = 'MicDrop730!'; // ⚠️ Change this anytime — it's the only thing gating dashboard access

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ============ STATE ============
let bookings = [];
let currentFilter = 'all';
let currentBookingId = null;

// ============ LOGIN ============
const loginScreen = document.getElementById('login-screen');
const dashboard = document.getElementById('dashboard');
const passwordInput = document.getElementById('password-input');
const loginBtn = document.getElementById('login-btn');
const loginError = document.getElementById('login-error');

// Session check (uses sessionStorage workaround via in-memory only — Claude artifact restriction)
let isLoggedIn = false;

loginBtn.addEventListener('click', tryLogin);
passwordInput.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') tryLogin();
});

function tryLogin() {
  if (passwordInput.value === DASHBOARD_PASSWORD) {
    isLoggedIn = true;
    loginScreen.style.display = 'none';
    dashboard.style.display = 'block';
    loadBookings();
    // Refresh every 30 seconds
    setInterval(loadBookings, 30000);
  } else {
    loginError.textContent = 'Wrong password';
    passwordInput.value = '';
    setTimeout(() => loginError.textContent = '', 3000);
  }
}

document.getElementById('logout-btn').addEventListener('click', () => {
  isLoggedIn = false;
  dashboard.style.display = 'none';
  loginScreen.style.display = 'flex';
  passwordInput.value = '';
});

// ============ LOAD BOOKINGS ============
async function loadBookings() {
  const { data, error } = await supabaseClient
    .from('micdrop_bookings')
    .select('*')
    .order('created_at', { ascending: false });

  if (error) {
    showToast('Error loading: ' + error.message, true);
    return;
  }
  bookings = data || [];
  renderBookings();
  renderStats();
}

// ============ STATS ============
function renderStats() {
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);

  const todayCount = bookings.filter(b => new Date(b.created_at) >= today).length;
  const monthRevenue = bookings
    .filter(b => new Date(b.created_at) >= monthStart && (b.status === 'paid' || b.status === 'in_production' || b.status === 'delivered'))
    .reduce((sum, b) => sum + (parseFloat(b.price_charged) || 0), 0);
  const pendingReview = bookings.filter(b => b.status === 'new').length;
  const totalRevenue = bookings
    .filter(b => b.status === 'paid' || b.status === 'in_production' || b.status === 'delivered')
    .reduce((sum, b) => sum + (parseFloat(b.price_charged) || 0), 0);

  document.getElementById('stats-bar').innerHTML = `
    <div class="stat-card"><div class="stat-value">${pendingReview}</div><div class="stat-label">Pending Review</div></div>
    <div class="stat-card"><div class="stat-value">${todayCount}</div><div class="stat-label">Today's Submissions</div></div>
    <div class="stat-card"><div class="stat-value">$${monthRevenue}</div><div class="stat-label">This Month</div></div>
    <div class="stat-card"><div class="stat-value">$${totalRevenue}</div><div class="stat-label">Total Earned</div></div>
  `;
}

// ============ FILTERS ============
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderBookings();
  });
});

// ============ RENDER BOOKINGS ============
function renderBookings() {
  // Update counts
  ['all', 'new', 'accepted', 'paid', 'in_production', 'delivered', 'declined'].forEach(s => {
    const count = s === 'all' ? bookings.length : bookings.filter(b => b.status === s).length;
    document.getElementById('count-' + s).textContent = count;
  });

  const filtered = currentFilter === 'all' ? bookings : bookings.filter(b => b.status === currentFilter);
  const container = document.getElementById('bookings-list');

  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🎤</div><div class="empty-state-text">No bookings in this view yet.</div></div>`;
    return;
  }

  container.innerHTML = filtered.map(b => `
    <div class="booking-card status-${b.status}" data-id="${b.id}">
      <div class="booking-top">
        <div class="booking-artist">${escapeHtml(b.artist_name)}</div>
        <div class="booking-time">${timeAgo(b.created_at)}</div>
      </div>
      <div class="booking-meta">
        <span class="meta-item">🎵 ${escapeHtml(b.song_title)}</span>
        <span class="meta-item">🎤 ${escapeHtml(b.tier_name)}</span>
        ${b.addons && b.addons.length ? `<span class="meta-item">+${b.addons.length} add-on${b.addons.length > 1 ? 's' : ''}</span>` : ''}
      </div>
      <div class="booking-bottom">
        <span class="status-badge ${b.status}">${b.status.replace('_', ' ')}</span>
        <span class="booking-price">${b.price_charged ? '$' + parseFloat(b.price_charged).toLocaleString() : 'Quote pending'}</span>
      </div>
    </div>
  `).join('');

  container.querySelectorAll('.booking-card').forEach(card => {
    card.addEventListener('click', () => openBooking(card.dataset.id));
  });
}

// ============ BOOKING DETAIL ============
function openBooking(id) {
  const b = bookings.find(x => x.id === id);
  if (!b) return;
  currentBookingId = id;

  document.getElementById('m-artist').textContent = b.artist_name;
  document.getElementById('m-submitted').textContent = `Submitted ${formatDate(b.created_at)}`;

  const body = document.getElementById('modal-body');

  let addonsHtml = '';
  if (b.addons && b.addons.length) {
    addonsHtml = b.addons.map(a => `<span class="addon-chip">${escapeHtml(a)}</span>`).join('');
  } else {
    addonsHtml = '<span style="color: var(--text-muted); font-size: 13px;">None</span>';
  }

  let photosHtml = '';
  if (b.photo_urls && b.photo_urls.length) {
    photosHtml = b.photo_urls.map(url => `<a href="${url}" target="_blank"><img src="${url}" alt="ref photo" /></a>`).join('');
  } else {
    photosHtml = '<span style="color: var(--text-muted); font-size: 13px;">No photos uploaded</span>';
  }

  body.innerHTML = `
    <div class="detail-section">
      <div class="detail-label">📞 Contact</div>
      <div class="detail-row"><span class="label">Phone</span><span class="value"><a href="tel:${b.phone}">${escapeHtml(b.phone)}</a></span></div>
      <div class="detail-row"><span class="label">Email</span><span class="value"><a href="mailto:${b.email}">${escapeHtml(b.email)}</a></span></div>
      ${b.instagram ? `<div class="detail-row"><span class="label">Instagram</span><span class="value"><a href="https://instagram.com/${b.instagram.replace('@', '')}" target="_blank">${escapeHtml(b.instagram)}</a></span></div>` : ''}
    </div>

    <div class="detail-section">
      <div class="detail-label">🎵 Song</div>
      <div class="detail-row"><span class="label">Title</span><span class="value">${escapeHtml(b.song_title)}</span></div>
      <div class="detail-row"><span class="label">Link</span><span class="value"><a href="${b.song_link}" target="_blank">Open Track ↗</a></span></div>
    </div>

    <div class="detail-section">
      <div class="detail-label">📦 Package</div>
      <div class="detail-row"><span class="label">Tier</span><span class="value">${escapeHtml(b.tier_detail)}</span></div>
      <div class="detail-row"><span class="label">Add-Ons</span><span class="value">${addonsHtml}</span></div>
      <div class="detail-row"><span class="label" style="color: var(--richmade-yellow); font-weight: 700;">AMOUNT CHARGED</span><span class="value" style="font-family: 'Anton', sans-serif; font-size: 22px; color: var(--richmade-yellow);">${b.price_charged ? '$' + parseFloat(b.price_charged).toLocaleString() : '— set after call —'}</span></div>
    </div>

    <div class="detail-section">
      <div class="detail-label">📸 Reference Photos</div>
      <div class="photo-gallery">${photosHtml}</div>
    </div>

    ${b.vibe_notes ? `
    <div class="detail-section">
      <div class="detail-label">🎨 Vibe Notes</div>
      <div class="vibe-notes-box">${escapeHtml(b.vibe_notes)}</div>
    </div>` : ''}

    <div class="detail-section">
      <div class="detail-label">📝 Internal Notes</div>
      <textarea class="internal-notes" id="internal-notes" placeholder="Notes for you / 730 — DM history, special requests, anything to remember">${escapeHtml(b.internal_notes || '')}</textarea>
      <button class="copy-btn" style="margin-top: 8px;" onclick="saveNotes()">Save Notes</button>
    </div>

    ${b.status === 'accepted' ? renderPaymentMessage(b) : ''}

    <div class="actions">
      <div style="font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 4px;">Current Status: <span style="color: var(--richmade-yellow);">${b.status.replace('_', ' ')}</span></div>

      ${b.status === 'new' ? `
        <div class="action-row">
          <button class="action-btn btn-accept" onclick="updateStatus('accepted')">✅ Accept</button>
          <button class="action-btn btn-decline" onclick="declineBooking()">❌ Decline</button>
        </div>
      ` : ''}

      ${b.status === 'accepted' ? `
        <div class="action-row">
          <button class="action-btn btn-paid" onclick="updateStatus('paid')">💰 Mark Paid</button>
          <button class="action-btn btn-decline" onclick="updateStatus('new')">↩ Back to New</button>
        </div>
      ` : ''}

      ${b.status === 'paid' ? `
        <div class="action-row">
          <button class="action-btn btn-production" onclick="updateStatus('in_production')">🎬 Start Production</button>
        </div>
      ` : ''}

      ${b.status === 'in_production' ? `
        <div class="action-row">
          <button class="action-btn btn-delivered" onclick="updateStatus('delivered')">📦 Mark Delivered</button>
        </div>
      ` : ''}

      ${b.status === 'delivered' || b.status === 'declined' ? `
        <div class="action-row">
          <button class="action-btn btn-decline" onclick="updateStatus('new')">↩ Reopen</button>
        </div>
      ` : ''}
    </div>
  `;

  document.getElementById('modal').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function renderPaymentMessage(b) {
  const total = b.price_charged ? '$' + parseFloat(b.price_charged).toLocaleString() : '[ENTER AMOUNT]';
  const message = `Yo ${b.artist_name}! 🎤

We reviewed your submission for "${b.song_title}" and we're locked in. Let's make it happen.

Your total: ${total}
${b.tier_detail}
${b.addons && b.addons.length ? '\nAdd-ons:\n' + b.addons.map(a => '• ' + a).join('\n') : ''}

Send payment to one of these to lock your slot:
💸 Cash App: $RichWells9
🏦 Zelle: Rich.madeit1@gmail.com
🍎 Apple Pay: hit me back for the number

Once payment hits, we kick off production immediately. I'll lock in your delivery window when we talk.

— Rich / 730 Radio`;

  return `
    <div class="payment-message-box">
      <div class="pm-label">💬 Payment Message — Copy & DM to ${b.artist_name}</div>
      <textarea id="payment-message">${message}</textarea>
      <button class="copy-btn" onclick="copyPaymentMessage()">📋 Copy Message</button>
    </div>
  `;
}

// ============ ACTIONS ============
async function updateStatus(newStatus) {
  if (!currentBookingId) return;

  const updates = { status: newStatus };
  const now = new Date().toISOString();

  if (newStatus === 'accepted') updates.accepted_at = now;
  if (newStatus === 'paid') updates.paid_at = now;
  if (newStatus === 'delivered') updates.delivered_at = now;
  if (newStatus === 'declined') updates.declined_at = now;

  const { error } = await supabaseClient
    .from('micdrop_bookings')
    .update(updates)
    .eq('id', currentBookingId);

  if (error) {
    showToast('Error: ' + error.message, true);
    return;
  }

  showToast(`Marked as ${newStatus.replace('_', ' ')}`);
  await loadBookings();
  openBooking(currentBookingId); // Re-open with updated state
}

async function declineBooking() {
  const reason = prompt('Reason for declining? (optional, for your records)');
  if (reason === null) return; // user cancelled

  const { error } = await supabaseClient
    .from('micdrop_bookings')
    .update({
      status: 'declined',
      declined_at: new Date().toISOString(),
      declined_reason: reason || null
    })
    .eq('id', currentBookingId);

  if (error) {
    showToast('Error: ' + error.message, true);
    return;
  }

  showToast('Booking declined');
  await loadBookings();
  openBooking(currentBookingId);
}

async function saveNotes() {
  const notes = document.getElementById('internal-notes').value;
  const { error } = await supabaseClient
    .from('micdrop_bookings')
    .update({ internal_notes: notes })
    .eq('id', currentBookingId);

  if (error) {
    showToast('Error saving notes', true);
    return;
  }
  showToast('Notes saved');
  await loadBookings();
}

function copyPaymentMessage() {
  const textarea = document.getElementById('payment-message');
  textarea.select();
  textarea.setSelectionRange(0, 99999); // For mobile
  navigator.clipboard.writeText(textarea.value).then(() => {
    showToast('Message copied — now DM it to the customer');
  }).catch(() => {
    document.execCommand('copy');
    showToast('Message copied');
  });
}

// ============ MODAL ============
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal').addEventListener('click', (e) => {
  if (e.target.id === 'modal') closeModal();
});

function closeModal() {
  document.getElementById('modal').classList.remove('show');
  document.body.style.overflow = '';
  currentBookingId = null;
}

// ============ UTILITIES ============
function timeAgo(date) {
  const seconds = Math.floor((Date.now() - new Date(date).getTime()) / 1000);
  if (seconds < 60) return 'just now';
  if (seconds < 3600) return Math.floor(seconds / 60) + 'm ago';
  if (seconds < 86400) return Math.floor(seconds / 3600) + 'h ago';
  if (seconds < 604800) return Math.floor(seconds / 86400) + 'd ago';
  return Math.floor(seconds / 604800) + 'w ago';
}

function formatDate(date) {
  return new Date(date).toLocaleString('en-US', {
    month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit'
  });
}

function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str).replace(/[&<>"']/g, m => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[m]));
}

function showToast(msg, isError) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.style.background = isError ? 'var(--on-air-red)' : 'var(--green)';
  toast.style.color = isError ? 'white' : 'var(--bg-black)';
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

// Expose functions globally for onclick handlers
window.updateStatus = updateStatus;
window.declineBooking = declineBooking;
window.saveNotes = saveNotes;
window.copyPaymentMessage = copyPaymentMessage;
</script>
